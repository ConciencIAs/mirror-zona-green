<nav class="bg-white shadow-sm py-2">
  <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
    <!-- Logo y Marca -->
    <a
      href="/home"
      class="flex items-center gap-2 text-2xl font-bold text-blue-600 hover:opacity-80 transition"
    >
      <svg
        width="40"
        height="40"
        viewBox="0 0 40 40"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <circle cx="20" cy="20" r="19" stroke="currentColor" stroke-width="2" />
        <text
          x="20"
          y="26"
          font-size="20"
          font-weight="bold"
          fill="currentColor"
          text-anchor="middle"
        >
          ZG
        </text>
      </svg>
      <span>ZenGo</span>
    </a>

    <!-- Items de Navegación Dinámica -->
    @if (navItems.length > 0) {
      <ul class="hidden md:flex list-none m-0 p-0 gap-8">
        @for (item of navItems; track item.label) {
          <li>
            <a
              [routerLink]="item.route"
              routerLinkActive="text-blue-600 border-b-2 border-blue-600"
              [routerLinkActiveOptions]="{ exact: false }"
              class="text-gray-700 text-base transition-colors duration-300 pb-2 border-b-2 border-transparent hover:text-blue-600 hover:border-blue-600"
            >
              @if (item?.icon) {
                <span>{{ item.icon }} </span>
              }
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
    }

    <!-- Botones de Acción -->
    <div class="flex gap-3 items-center">
      <a
        href="/auth/login"
        class="px-6 py-2 border border-blue-600 text-blue-600 rounded transition-all duration-300 hover:bg-gray-100"
      >
        Iniciar Sesión
      </a>
      <a
        href="/auth/register"
        class="px-6 py-2 bg-blue-600 text-white rounded transition-all duration-300 hover:bg-blue-700"
      >
        Registrarse
      </a>
    </div>
  </div>
</nav>
