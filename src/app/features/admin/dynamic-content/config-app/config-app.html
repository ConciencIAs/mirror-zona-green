<div class="p-6 flex flex-col gap-6 max-w-7xl mx-auto pt-10">
  <div class="flex justify-between items-center flex-wrap gap-4 border-b border-slate-200 dark:border-slate-800 pb-5">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2 m-0">
        <i class="pi pi-cog text-emerald-600"></i>
        Configuración de la App
      </h1>
      <p class="text-slate-500 dark:text-slate-400 mt-1 text-sm">Gestiona la información global, barra de navegación,
        pie de página y anuncios.</p>
    </div>
  </div>
  <p-tabs [(value)]="tab">

    <p-tablist>
      <p-tab value="general">
        <div class="flex items-center gap-2">
          <i class="pi pi-info-circle"></i>
          <span>General</span>
        </div>
      </p-tab>

      <p-tab value="navbar">
        <div class="flex items-center gap-2">
          <i class="pi pi-bars"></i>
          <span>Navbar</span>
        </div>
      </p-tab>

      <p-tab value="footer">
        <div class="flex items-center gap-2">
          <i class="pi pi-map"></i>
          <span>Footer</span>
        </div>
      </p-tab>

      <p-tab value="publicidad">
        <div class="flex items-center gap-2">
          <i class="pi pi-megaphone"></i>
          <span>Anuncios (Publicidad)</span>
        </div>
      </p-tab>
    </p-tablist>

    <p-tabpanels>

      <p-tabpanel value="general">
        <div
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 md:p-8 shadow-sm">
          <app-config-general />
        </div>
      </p-tabpanel>

      <p-tabpanel value="navbar">
        <div
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 md:p-8 shadow-sm">
          <app-config-navbar />
        </div>
      </p-tabpanel>

      <p-tabpanel value="footer">
        <div
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 md:p-8 shadow-sm">
          <app-config-footer />
        </div>
      </p-tabpanel>

      <p-tabpanel value="publicidad">
        <div
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 md:p-8 shadow-sm">
          <app-config-publicidad />
        </div>
      </p-tabpanel>

    </p-tabpanels>

  </p-tabs>
</div>
