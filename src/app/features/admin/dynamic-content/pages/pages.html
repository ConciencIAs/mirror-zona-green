<div class="p-6 flex flex-col gap-6 max-w-7xl mx-auto">

  <!-- Header -->
  <div class="flex items-start justify-between flex-wrap gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2 m-0">
        <i class="pi pi-file-edit text-emerald-600"></i>
        Contenido Dinámico
      </h1>
      <p class="text-slate-500 dark:text-slate-400 mt-1 text-sm">
        Administra las páginas dinámicas del sitio
      </p>
    </div>
    <p-button
      id="btn-new-page"
      label="Nueva Página"
      icon="pi pi-plus"
      (onClick)="navigateToNew()"
      styleClass="p-button-emerald"
    />
  </div>

  <!-- Tabla -->
  <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm overflow-hidden">
    <p-table
      id="dynamic-content-table"
      [value]="pages()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[5, 10, 25]"
      styleClass="p-datatable-striped"
      [tableStyle]="{ 'min-width': '60rem' }"
      emptyMessage="No hay páginas creadas aún."
    >
      <ng-template pTemplate="header">
        <tr class="bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
          <th class="text-slate-700 dark:text-slate-300 font-semibold p-4">Nombre</th>
          <th class="text-slate-700 dark:text-slate-300 font-semibold p-4">Slug / URL</th>
          <th class="text-slate-700 dark:text-slate-300 font-semibold p-4">Fecha de creación</th>
          <th class="text-slate-700 dark:text-slate-300 font-semibold p-4 text-center" style="width: 10rem;">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-page>
        <tr class="border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50/50 dark:hover:bg-slate-800/50 transition-colors">
          <td class="p-4">
            <span class="font-semibold text-slate-800 dark:text-slate-200">{{ page.name }}</span>
          </td>
          <td class="p-4">
            <a
              class="inline-flex items-center gap-1.5 text-emerald-600 hover:text-emerald-700 dark:text-emerald-400 dark:hover:text-emerald-300 font-mono text-sm no-underline hover:underline transition-all"
              [href]="'/content/' + page.slug"
              target="_blank"
              rel="noopener"
            >
              <i class="pi pi-link text-xs"></i>
              /content/{{ page.slug }}
            </a>
          </td>
          <td class="p-4 text-slate-600 dark:text-slate-400 text-sm">
            {{ page.created_at | date:'dd/MM/yyyy HH:mm' }}
          </td>
          <td class="p-4">
            <div class="flex justify-center gap-2">
              <p-button
                [id]="'btn-edit-' + page.id"
                icon="pi pi-pencil"
                size="small"
                severity="secondary"
                pTooltip="Editar"
                tooltipPosition="top"
                (onClick)="navigateToEditor(page.id)"
              />
              <p-button
                [id]="'btn-delete-' + page.id"
                icon="pi pi-trash"
                size="small"
                severity="danger"
                pTooltip="Eliminar"
                tooltipPosition="top"
                (onClick)="confirmDelete(page)"
              />
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

</div>

<p-confirmDialog />
