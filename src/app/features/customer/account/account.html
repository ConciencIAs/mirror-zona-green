<div class="min-h-screen bg-gradient-to-br from-slate-50 to-green-50 py-10 px-4">
  <div class="max-w-2xl mx-auto">

    <!-- ==============================
         HEADER
    =============================== -->
    <div class="mb-8">
      <div class="flex items-center gap-3 mb-1">
        <!-- Ícono de usuario -->
        <div class="w-12 h-12 rounded-2xl bg-primary-500 flex items-center justify-center shadow-md">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
          </svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-slate-900">Mi cuenta</h1>
          <p class="text-sm text-slate-500">Administra tu información personal</p>
        </div>
      </div>
    </div>

    <!-- ==============================
         CARD PRINCIPAL
    =============================== -->
    <div class="rounded-3xl bg-white shadow-lg shadow-slate-200 overflow-hidden">

      <!-- Datos de solo lectura -->
      <div class="bg-gradient-to-r from-primary-500 to-green-600 px-6 py-5">
        <p class="text-xs font-semibold uppercase tracking-widest text-green-100 mb-3">Información de cuenta</p>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <!-- Correo (no editable) -->
          <div>
            <p class="text-xs text-green-200 mb-0.5">Correo electrónico</p>
            <p class="text-sm font-semibold text-white truncate">{{ correo() || '—' }}</p>
          </div>
          <!-- Fecha de registro -->
          <div>
            <p class="text-xs text-green-200 mb-0.5">Miembro desde</p>
            <p class="text-sm font-semibold text-white">{{ createdAt() }}</p>
          </div>
        </div>
      </div>

      <!-- FORM -->
      <form (submit)="submit($event)" class="p-6 space-y-5">

        <p class="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-1">Datos editables</p>

        <!-- NOMBRE COMPLETO -->
        <app-form-input [control]="profileForm.full_name()" label="Nombre completo" placeholder="Ej: Juan Pérez" />

        <!-- TELÉFONO -->
        <app-form-input [control]="profileForm.telefono()" label="Teléfono" placeholder="+573001234567" />

        <!-- TIPO DOC + DOCUMENTO -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <app-form-select [control]="profileForm.tipo_documento()" label="Tipo de documento"
            [options]="documentTypeOptions" placeholder="Selecciona" />
          <app-form-input [control]="profileForm.documento()" label="Número de documento"
            placeholder="Ej: 1234567890" />
        </div>

        <!-- FECHA DE NACIMIENTO -->
        <app-form-datepicker [control]="profileForm.fecha_nacimiento()" label="Fecha de nacimiento" [maxDate]="maxDate"
          placeholder="dd/mm/aaaa" />

        <!-- UBICACIÓN -->
        <app-form-input [control]="profileForm.ubicacion()" label="Dirección de envío"
          placeholder="Dirección de envío" />

        <!-- BOTÓN GUARDAR -->
        <div class="pt-2 flex justify-end">
          <button id="btn-guardar-perfil" type="submit" [disabled]="loading()"
            class="inline-flex items-center gap-2 rounded-xl bg-primary-500 px-6 py-3 text-sm font-semibold text-white shadow transition hover:bg-primary-700 disabled:cursor-not-allowed disabled:opacity-60">
            @if (loading()) {
            <!-- Spinner -->
            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <span>Guardando...</span>
            } @else {
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M17 3H7a2 2 0 0 0-2 2v16l7-3 7 3V5a2 2 0 0 0-2-2Z" />
            </svg>
            <span>Guardar cambios</span>
            }
          </button>
        </div>

      </form>
    </div>

    <!-- Nota informativa -->
    <p class="mt-4 text-center text-xs text-slate-400">
      El correo electrónico no puede modificarse desde aquí.
      Si necesitas cambiarlo, contacta al soporte.
    </p>

  </div>
</div>
