<ng-template #authContent>
  <form [formGroup]="loginForm" (ngSubmit)="submit()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2">Correo electrónico</label>
      <input
        type="email"
        formControlName="email"
        class="w-full rounded-xl border px-4 py-3 transition focus:outline-none focus:ring-2 focus:ring-blue-500"
        [class.border-red-500]="emailControl.invalid && emailControl.touched"
        [class.ring-red-200]="emailControl.invalid && emailControl.touched"
        placeholder="correo@ejemplo.com"
        autocomplete="email"
      />
      @if (emailError) {
        <p class="mt-2 text-xs text-red-600">{{ emailError }}</p>
      }
    </div>

    <div class="flex justify-between items-center text-sm text-slate-500">
      <span>¿No tienes cuenta?</span>
      <a class="text-blue-600 hover:underline" routerLink="/auth/register">Regístrate</a>
    </div>

    <button
      type="submit"
      [disabled]="loading()"
      class="w-full rounded-xl bg-blue-600 px-4 py-3 text-white font-semibold transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-slate-400"
    >
      @if (!loading()) {
        <span>Enviar enlace mágico</span>
      }
      @if (loading()) {
        <span>Enviando...</span>
      }
    </button>
  </form>

  @if (generalError()) {
    <div class="rounded-xl border border-red-200 bg-red-50 p-4 mt-5 text-sm text-red-700">
      {{ generalError() }}
    </div>
  }
</ng-template>
