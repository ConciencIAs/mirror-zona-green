<div class="max-w-md mx-auto my-10 p-6 bg-white rounded-3xl shadow-lg shadow-slate-200">
  <!-- HEADER -->
  <h1 class="text-3xl font-semibold mb-2 text-slate-900">Registro de cliente</h1>

  <p class="text-sm text-slate-500 mb-6">
    Llena tus datos para recibir el enlace mágico y continuar.
  </p>

  <!-- FORM -->
  <form (submit)="submit($event)" class="space-y-4">
    <!-- NOMBRE -->
    <app-form-input [control]="registerForm.full_name()" label="Nombre completo" placeholder="Juan Pérez" />

    <!-- CORREO -->
    <app-form-input [control]="registerForm.correo()" label="Correo" placeholder="correo@ejemplo.com" />

    <!-- GRID -->
    <div class="grid grid-cols-2 gap-4">
      <!-- TELEFONO -->
      <app-form-input [control]="registerForm.telefono()" type="number" label="Teléfono" placeholder="+573001234567" />

      <!-- TIPO DOCUMENTO -->
      <app-form-select [control]="registerForm.tipo_documento()" label="Tipo documento" [options]="documentTypeOptions"
        placeholder="Selecciona" />
    </div>

    <!-- DOCUMENTO -->
    <app-form-input [control]="registerForm.documento()" type="number" label="Documento"
      placeholder="Número de documento" />

    <!-- FECHA -->
    <app-form-datepicker [control]="registerForm.fecha_nacimiento()" label="Fecha de nacimiento" />

    <!-- UBICACION -->
    <app-form-input [control]="registerForm.ubicacion()" label="Ubicación" type="text"
      placeholder="Ciudad, dirección..." />

    <!-- ACEPTA TERMINOS -->
    <app-form-input-checkbox [control]="registerForm.acepta_terminos()" label="Acepto los términos y condiciones" />

    <!-- ACEPTA POLITICA PRIVACIDAD -->
    <app-form-input-checkbox [control]="registerForm.acepta_politica_privacidad()"
      label="Acepto la política de privacidad" />

    <!-- ERROR GENERAL -->
    @if (generalError()) {
    <div class="rounded-xl border border-red-200 bg-red-50 p-4 mt-2 text-sm text-red-700">
      {{ generalError() }}
    </div>
    }

    <!-- BUTTON -->
    <div class="flex items-center justify-end">
      <button type="submit"
        class="w-full rounded-xl bg-primary-500 px-4 py-3 text-white font-semibold transition hover:bg-primary-800 disabled:cursor-not-allowed disabled:bg-slate-400"
        [disabled]="loading()">
        @if (!loading()) {
        <span>Enviar enlace</span>
        }

        @if (loading()) {
        <span>Enviando...</span>
        }
      </button>
    </div>
  </form>

  <!-- MODAL -->
  @if (showErrorsModal()) {
  <div class="fixed inset-0 bg-black/40 flex items-center justify-center px-4 py-6 z-50">
    <div class="w-full max-w-lg rounded-3xl bg-white p-6 shadow-2xl">
      <h3 class="text-xl font-semibold mb-3">Errores en el formulario</h3>

      <ul class="list-disc pl-5 space-y-2 max-h-68 overflow-auto text-sm text-slate-700">
        @for (e of this.registerForm().errorSummary(); track e) {
        <li>{{ e.message }}</li>
        }
      </ul>

      <div class="mt-6 flex justify-end">
        <button class="rounded-xl bg-slate-100 px-4 py-2 text-sm text-slate-700 hover:bg-slate-200"
          (click)="closeErrorsModal()">
          Cerrar
        </button>
      </div>
    </div>
  </div>
  }
</div>
