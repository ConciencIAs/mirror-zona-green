name: Mirror Repo via SSH

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    environment: mirror
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔐 Esta acción levanta el agente y comparte las variables entre pasos automáticamente
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Push to mirror repo
        run: |
          git remote add mirror git@github.com:ConciencIAs/mirror-zona-green.git
          git push mirror main
